name: CI

on:
  pull_request:
  push:
    branches-ignore: [master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=critical

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Typecheck functions
        run: npm --prefix functions run build

  rules-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # firebase-tools requires a JDK 21+ runtime to start the Firestore emulator.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Firestore security rules tests
        run: npx firebase-tools emulators:exec --only firestore --project demo-wine-tracker "npm run test:rules"
